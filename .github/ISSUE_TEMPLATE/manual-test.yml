name: "🧪 Manual Test"
description: "Define a reusable manual test case with documented steps"
title: "[Test] "
labels: ["test"]
body:
  - type: markdown
    attributes:
      value: |
        ## Manual Test Case
        Define a reusable test case. Log each execution as a **comment** on this issue.

  - type: textarea
    id: description
    attributes:
      label: Test Description
      description: "Describe what this test case verifies and its purpose."
      placeholder: "This test verifies that ..."
    validations:
      required: true

  - type: textarea
    id: preconditions
    attributes:
      label: Preconditions
      description: "List any preconditions or setup steps required before executing this test."
      placeholder: |
        - System is deployed to staging environment
        - User has admin permissions
        - Test data has been prepared
    validations:
      required: false

  - type: textarea
    id: test-steps
    attributes:
      label: Test Steps
      description: "Define each step with the action to perform and the expected result."
      value: |
        | Step | Action | Expected Result |
        |------|--------|-----------------|
        | 1 | _Describe what to do_ | _Describe the expected outcome_ |
        | 2 | _Describe what to do_ | _Describe the expected outcome_ |
        | 3 | _Describe what to do_ | _Describe the expected outcome_ |
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## How to Log a Test Execution
        Add a **comment** to this issue for each test run using the template below:

        ```
        **Date:** YYYY-MM-DD
        **Tester:** @username
        **Environment:** e.g. staging / production / local

        | Step | Result | Notes |
        |------|--------|-------|
        | 1 | :green_circle: | |
        | 2 | :red_circle: | Describe what went wrong |
        | 3 | :white_circle: | Not tested |

        **Overall Result:** Passed / Failed / Blocked
        ```

        > :green_circle: Passed | :red_circle: Failed | :yellow_circle: Blocked | :white_circle: Not tested

  - type: input
    id: tested-by
    attributes:
      label: Tested By
      description: "Who executed this test? (GitHub username or name)"
      placeholder: "@username"
    validations:
      required: false

  - type: input
    id: test-date
    attributes:
      label: Test Date
      description: "When was this test executed? (Format: YYYY-MM-DD)"
      placeholder: "YYYY-MM-DD"
    validations:
      required: false

  - type: textarea
    id: test-evidence
    attributes:
      label: Test Evidence / Notes
      description: "Add screenshots, logs, or notes from the test execution. Drag & drop images here."
      placeholder: "Attach screenshots or describe observations..."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ## Additional Information
